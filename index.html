<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoveBox QR • Packing Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  body { font-family: system-ui, -apple-system, sans-serif; }
  .box-card { transition: all 0.2s ease; }
  .box-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
  .modal { animation: fadeInScale 0.2s ease forwards; }
  @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  .qr-container { background: white; padding: 16px; border-radius: 12px; }
  .status-packed { background-color: #dbeafe; color: #1e40af; }
  .status-ontruck { background-color: #fef3c7; color: #92400e; }
  .status-arrived { background-color: #d1fae5; color: #065f46; }
  .status-unpacked { background-color: #e0e7ff; color: #3730a3; }
  .mic-btn { transition: all 0.1s ease; }
  .mic-btn.listening { background-color: #ef4444; color: white; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
</style>
</head>
<body class="bg-zinc-950 text-zinc-200">
<div class="max-w-4xl mx-auto">
  <!-- Header -->
  <div class="bg-zinc-900 border-b border-zinc-800 px-6 py-5 flex items-center justify-between sticky top-0 z-50">
    <div>
      <h1 class="text-3xl font-bold tracking-tight">MoveBox QR</h1>
      <p class="text-zinc-400 text-sm">Debbie Lane Move • Know every box</p>
    </div>
    <div class="flex items-center gap-3 relative">
      <button onclick="toggleHamburgerMenu(event)" id="hamburger-btn"
              class="p-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-xl leading-none">☰</button>
      <div id="hamburger-menu" onclick="event.stopPropagation()"
           class="hidden absolute right-0 top-full mt-2 w-52 bg-zinc-800 border border-zinc-700 rounded-2xl shadow-xl z-[300] overflow-hidden">
        <button onclick="showNewBoxModal(); closeHamburgerMenu()"
                class="w-full text-left px-5 py-3.5 hover:bg-zinc-700 font-semibold text-emerald-400">+ New Box</button>
        <div class="border-t border-zinc-700"></div>
        <button onclick="showBulkPrintModal(); closeHamburgerMenu()"
                class="w-full text-left px-5 py-3.5 hover:bg-zinc-700 text-sm font-semibold">🖨️ Bulk Print Labels</button>
        <div class="border-t border-zinc-700"></div>
        <button onclick="exportData(); closeHamburgerMenu()"
                class="w-full text-left px-5 py-3.5 hover:bg-zinc-700 text-sm">Export Data</button>
        <div class="border-t border-zinc-700"></div>
        <button onclick="window.MBSync && window.MBSync.openModal(); closeHamburgerMenu()"
                class="w-full text-left px-5 py-3.5 hover:bg-zinc-700 text-sm">☁️ Cloud Sync</button>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="flex border-b border-zinc-800 bg-zinc-900 px-2">
    <button onclick="switchTab(0)" id="tab-0"
            class="tab-btn flex-1 py-4 font-medium border-b-2 border-emerald-500 text-emerald-400">Dashboard</button>
    <button onclick="switchTab(1)" id="tab-1"
            class="tab-btn flex-1 py-4 font-medium text-zinc-400 hover:text-zinc-200">My Boxes</button>
    <button onclick="switchTab(2)" id="tab-2"
            class="tab-btn flex-1 py-4 font-medium text-zinc-400 hover:text-zinc-200">Scan QR</button>
  </div>

  <!-- DASHBOARD -->
  <div id="view-0" class="p-6">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="bg-zinc-900 rounded-3xl p-5">
        <div class="text-zinc-400 text-sm">Total Boxes</div>
        <div id="stat-total" class="text-5xl font-bold mt-1">0</div>
      </div>
      <div class="bg-zinc-900 rounded-3xl p-5">
        <div class="text-zinc-400 text-sm">Packed</div>
        <div id="stat-packed" class="text-5xl font-bold mt-1 text-blue-400">0</div>
      </div>
      <div class="bg-zinc-900 rounded-3xl p-5">
        <div class="text-zinc-400 text-sm">On Truck / Arrived</div>
        <div id="stat-progress" class="text-5xl font-bold mt-1 text-amber-400">0</div>
      </div>
      <div class="bg-zinc-900 rounded-3xl p-5">
        <div class="text-zinc-400 text-sm">Unpacked</div>
        <div id="stat-unpacked" class="text-5xl font-bold mt-1 text-violet-400">0</div>
      </div>
    </div>

    <h2 class="font-semibold text-xl mb-4 px-1">Boxes by Room</h2>
    <div id="room-stats" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
  </div>

  <!-- MY BOXES -->
  <div id="view-1" class="p-6 hidden">
    <div class="flex gap-3 mb-4">
      <input id="search-input" type="text" placeholder="Search boxes or items..." 
             class="flex-1 bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3 text-lg focus:outline-none focus:border-emerald-500"
             oninput="renderBoxesList()">
      <select id="room-filter" onchange="renderBoxesList()"
              class="bg-zinc-900 border border-zinc-700 rounded-2xl px-4 text-sm">
        <option value="">All Rooms</option>
      </select>
      <button onclick="showBulkPrintModal()"
              class="bg-zinc-900 border border-zinc-700 hover:bg-zinc-800 rounded-2xl px-4 text-sm whitespace-nowrap">
        🖨️ Bulk Print
      </button>
    </div>

    <div id="boxes-list" class="space-y-3"></div>
  </div>

  <!-- SCAN QR -->
  <div id="view-2" class="p-6 hidden text-center">
    <div class="max-w-md mx-auto">
      <div class="mb-6">
        <div class="mx-auto w-20 h-20 bg-zinc-800 rounded-3xl flex items-center justify-center mb-4">
          <span class="text-5xl">📷</span>
        </div>
        <h2 class="text-2xl font-semibold mb-2">Scan Box QR Code</h2>
        <p class="text-zinc-400">Point your camera at any box label to instantly see what’s inside and where it goes.</p>
      </div>

      <button onclick="startScanner()" 
              class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700 rounded-3xl text-xl font-semibold shadow-xl mb-4">
        Start Camera Scan
      </button>
      
      <button onclick="stopScanner()" 
              class="w-full py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm">
        Stop Scanner
      </button>

      <div id="qr-reader" class="mt-6 mx-auto max-w-[320px] rounded-3xl overflow-hidden border border-zinc-700"></div>
      <div id="scan-result" class="mt-4 text-sm text-zinc-400"></div>
    </div>
  </div>
</div>

<!-- Box Detail Modal -->
<div id="box-modal" onclick="if (event.target.id === 'box-modal') closeModal()" 
     class="hidden fixed inset-0 bg-black/70 flex items-end md:items-center justify-center z-[100]">
  <div onclick="event.stopImmediatePropagation()" 
       class="bg-zinc-900 w-full md:w-[520px] md:rounded-3xl md:m-4 rounded-t-3xl p-6 max-h-[92vh] overflow-auto">
    
    <div class="flex justify-between items-start mb-4 gap-3">
      <button onclick="closeModal()"
              class="flex items-center gap-2 px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium flex-shrink-0">
        ← Back
      </button>
      <div class="flex-1 text-right">
        <div id="modal-box-id" class="font-mono text-emerald-400 text-sm font-bold"></div>
        <div id="modal-room" class="text-2xl font-semibold"></div>
      </div>
      <button onclick="closeModal()" class="text-3xl leading-none text-zinc-500 hover:text-white flex-shrink-0">×</button>
    </div>

    <!-- Status -->
    <div class="flex gap-2 mb-6" id="status-buttons"></div>

    <!-- QR Code -->
    <div class="qr-container mb-6 flex justify-center">
      <div id="modal-qr"></div>
    </div>

    <!-- Items with Voice Input -->
    <div class="mb-6">
      <div class="flex justify-between items-center mb-3">
        <div class="font-semibold">Contents</div>
        <button onclick="addItemToCurrentBox()" 
                class="text-sm px-4 py-1.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">+ Add Item</button>
      </div>

      <!-- Voice-powered item input -->
      <div class="flex gap-2 mb-3">
        <input id="item-input" type="text" placeholder="Type item, then tap +"
               class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500"
               onkeydown="if (event.key === 'Enter') addTypedItem()">
        <button onclick="addTypedItem()"
                class="px-4 py-3 bg-emerald-700 hover:bg-emerald-600 rounded-2xl text-lg font-bold leading-none">+</button>
        <button onclick="startVoiceInput()" id="mic-btn"
                class="mic-btn px-4 py-3 bg-zinc-700 hover:bg-zinc-600 rounded-2xl flex items-center justify-center">
          <span class="text-xl">🎤</span>
        </button>
      </div>

      <div id="modal-items" class="space-y-2 text-sm"></div>
    </div>

    <!-- Notes -->
    <div class="mb-6">
      <div class="font-semibold mb-2">Notes</div>
      <textarea id="modal-notes" onblur="saveNotes()" 
                class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl p-4 text-sm h-20 resize-y" 
                placeholder="Fragile • Top load • Heavy • etc."></textarea>
    </div>

    <div class="mb-3">
      <button id="save-box-btn" onclick="saveCurrentBox()"
              class="w-full py-4 bg-red-600 hover:bg-red-500 active:bg-red-700 text-white font-bold text-lg rounded-2xl">
        Save
      </button>
    </div>
    <div class="flex gap-3">
      <button onclick="printLabel()"
              class="flex-1 py-3 bg-white text-black font-semibold rounded-2xl">Print Label</button>
      <button onclick="deleteCurrentBox()"
              class="flex-1 py-3 bg-red-900/70 hover:bg-red-900 text-red-300 rounded-2xl">Delete Box</button>
    </div>
  </div>
</div>

<script>
// ==================== DATA ====================
let boxes = JSON.parse(localStorage.getItem('movingBoxes') || '[]');
window.__getBoxes = () => boxes;
window.__setBoxes = (newBoxes) => { boxes = newBoxes; };
window.__reloadBoxes = () => { boxes = JSON.parse(localStorage.getItem('movingBoxes') || '[]'); };
let currentBoxId = null;
let html5QrCode = null;
let recognition = null;

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

const defaultRooms = [
  "Master Bedroom", "Emma's Room", "Son's Room", "Kitchen", 
  "Living Room", "Dining Room", "Master Bathroom", "Kids Bathroom",
  "Office", "Workshop / Man Cave", "Pole Barn / Storage", "Garage", 
  "Laundry Room", "Misc / Other"
];

function saveData() {
  localStorage.setItem('movingBoxes', JSON.stringify(boxes));
}

function generateBoxId() {
  const max = boxes.length > 0 ? Math.max(...boxes.map(b => parseInt(b.id.split('-')[1]))) : 0;
  return `BOX-${String(max + 1).padStart(4, '0')}`;
}

// ==================== TABS ====================
function switchTab(tab) {
  document.querySelectorAll('[id^="view-"]').forEach(el => el.classList.add('hidden'));
  document.getElementById(`view-${tab}`).classList.remove('hidden');

  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('border-b-2', i === tab);
    btn.classList.toggle('border-emerald-500', i === tab);
    btn.classList.toggle('text-emerald-400', i === tab);
    btn.classList.toggle('text-zinc-400', i !== tab);
  });

  if (tab === 1) renderBoxesList();
  if (tab === 0) renderDashboard();
}

// ==================== DASHBOARD ====================
function renderDashboard() {
  const total = boxes.length;
  const packed = boxes.filter(b => b.status === 'packed').length;
  const progress = boxes.filter(b => ['ontruck', 'arrived'].includes(b.status)).length;
  const unpacked = boxes.filter(b => b.status === 'unpacked').length;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-packed').textContent = packed;
  document.getElementById('stat-progress').textContent = progress;
  document.getElementById('stat-unpacked').textContent = unpacked;

  const roomCounts = {};
  boxes.forEach(box => {
    roomCounts[box.room] = (roomCounts[box.room] || 0) + 1;
  });

  const container = document.getElementById('room-stats');
  if (Object.keys(roomCounts).length === 0) {
    container.innerHTML = `<div class="col-span-full text-center py-8 text-zinc-500">No boxes yet. Create your first box!</div>`;
  } else {
    container.innerHTML = Object.entries(roomCounts).sort((a,b) => b[1]-a[1]).map(([room, count]) => `
        <div data-room="${room.replace(/"/g, '&quot;')}"
             class="bg-zinc-900 hover:bg-zinc-800 cursor-pointer rounded-3xl p-5 flex justify-between items-center">
          <div>
            <div class="font-semibold">${escapeHtml(room)}</div>
            <div class="text-xs text-zinc-500">${count} box${count > 1 ? 'es' : ''}</div>
          </div>
          <div class="text-4xl font-bold text-emerald-400">${count}</div>
        </div>
      `).join('');
    container.querySelectorAll('[data-room]').forEach(el => {
      el.addEventListener('click', () => filterByRoom(el.dataset.room));
    });
  }
}

function filterByRoom(room) {
  switchTab(1);
  document.getElementById('room-filter').value = room;
  renderBoxesList();
}

// ==================== BOXES LIST ====================
function renderBoxesList() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const roomFilter = document.getElementById('room-filter').value;

  let filtered = boxes;
  if (roomFilter) filtered = filtered.filter(b => b.room === roomFilter);
  if (search) {
    filtered = filtered.filter(b => 
      b.id.toLowerCase().includes(search) || 
      b.room.toLowerCase().includes(search) ||
      (b.items && b.items.join(' ').toLowerCase().includes(search))
    );
  }

  const container = document.getElementById('boxes-list');
  
  if (filtered.length === 0) {
    container.innerHTML = `<div class="text-center py-12 text-zinc-500">No boxes found.</div>`;
    return;
  }

  container.innerHTML = filtered.map(box => {
    const itemCount = box.items ? box.items.length : 0;
    return `
      <div onclick="showBoxDetail('${box.id}')" 
           class="box-card bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-3xl p-5 cursor-pointer">
        <div class="flex justify-between items-start">
          <div>
            <div class="font-mono text-emerald-400 text-sm">${box.id}</div>
            <div class="text-2xl font-semibold">${escapeHtml(box.room)}</div>
          </div>
          <div class="text-right">
            <div class="text-xs px-3 py-1 rounded-full ${getStatusClass(box.status)}">${getStatusLabel(box.status)}</div>
            <div class="text-xs text-zinc-500 mt-1">${itemCount} item${itemCount !== 1 ? 's' : ''}</div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function getStatusClass(status) {
  if (status === 'packed') return 'status-packed';
  if (status === 'ontruck') return 'status-ontruck';
  if (status === 'arrived') return 'status-arrived';
  if (status === 'unpacked') return 'status-unpacked';
  return 'bg-zinc-700 text-zinc-300';
}

function getStatusLabel(status) {
  if (status === 'packed') return 'Packed';
  if (status === 'ontruck') return 'On Truck';
  if (status === 'arrived') return 'Arrived';
  if (status === 'unpacked') return 'Unpacked';
  return 'Packed';
}

// ==================== CREATE NEW BOX ====================
function showNewBoxModal() {
  const roomOptions = defaultRooms.map(r => `<option value="${r}">${r}</option>`).join('');
  
  const modalHTML = `
    <div class="fixed inset-0 bg-black/70 flex items-center justify-center z-[200]" onclick="this.remove()">
      <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 rounded-3xl p-6 w-full max-w-md mx-4">
        <h3 class="text-2xl font-semibold mb-6">Create New Box</h3>
        
        <div class="mb-5">
          <label class="block text-sm mb-2 text-zinc-400">Destination Room in New House</label>
          <select id="new-room-select" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-lg">
            ${roomOptions}
            <option value="custom">+ Add Custom Room</option>
          </select>
        </div>

        <div id="custom-room-div" class="hidden mb-5">
          <label class="block text-sm mb-2 text-zinc-400">Custom Room Name</label>
          <input id="custom-room-input" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3" placeholder="e.g. Craft Room">
        </div>

        <div class="flex gap-3">
          <button onclick="this.closest('.fixed').remove()" 
                  class="flex-1 py-3 bg-zinc-800 rounded-2xl">Cancel</button>
          <button onclick="createNewBox(this)" 
                  class="flex-1 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-semibold">Create Box</button>
        </div>
      </div>
    </div>
  `;
  
  document.body.insertAdjacentHTML('beforeend', modalHTML);
  
  setTimeout(() => {
    const select = document.getElementById('new-room-select');
    const customDiv = document.getElementById('custom-room-div');
    select.onchange = () => {
      customDiv.classList.toggle('hidden', select.value !== 'custom');
    };
  }, 100);
}

function createNewBox(btn) {
  const select = document.getElementById('new-room-select');
  let room = select.value;
  
  if (room === 'custom') {
    room = document.getElementById('custom-room-input').value.trim();
    if (!room) { alert("Please enter a room name"); return; }
  }
  
  const newBox = {
    id: generateBoxId(),
    room: room,
    items: [],
    notes: "",
    status: "packed",
    created: new Date().toISOString()
  };
  
  boxes.unshift(newBox);
  saveData();
  btn.closest('.fixed').remove();
  
  showBoxDetail(newBox.id);
  renderDashboard();
  populateRoomFilter();
}

// ==================== BOX DETAIL + VOICE INPUT ====================
function showBoxDetail(boxId) {
  currentBoxId = boxId;
  const box = boxes.find(b => b.id === boxId);
  if (!box) return;

  document.getElementById('modal-box-id').textContent = box.id;
  document.getElementById('modal-room').textContent = box.room;
  document.getElementById('modal-notes').value = box.notes || '';

  const statusContainer = document.getElementById('status-buttons');
  statusContainer.innerHTML = `
    <button onclick="updateStatus('packed')" class="flex-1 py-2 text-xs rounded-2xl status-packed">Packed</button>
    <button onclick="updateStatus('ontruck')" class="flex-1 py-2 text-xs rounded-2xl status-ontruck">On Truck</button>
    <button onclick="updateStatus('arrived')" class="flex-1 py-2 text-xs rounded-2xl status-arrived">Arrived</button>
    <button onclick="updateStatus('unpacked')" class="flex-1 py-2 text-xs rounded-2xl status-unpacked">Unpacked</button>
  `;

  renderItemsList(box);

  const qrContainer = document.getElementById('modal-qr');
  qrContainer.innerHTML = '';
  new QRCode(qrContainer, {
    text: box.id,
    width: 180,
    height: 180,
    colorDark: "#000000",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.H
  });

  document.getElementById('box-modal').classList.remove('hidden');
  document.getElementById('box-modal').classList.add('flex');
}

function renderItemsList(box) {
  const container = document.getElementById('modal-items');
  if (!box.items || box.items.length === 0) {
    container.innerHTML = `<div class="text-zinc-500 text-sm py-2">No items added yet. Tap the mic to speak.</div>`;
    return;
  }
  
  container.innerHTML = box.items.map((item, index) => `
    <div class="flex items-center justify-between bg-zinc-800 rounded-2xl px-4 py-3 text-sm group">
      <span>${escapeHtml(item)}</span>
      <button onclick="removeItem(${index}); event.stopImmediatePropagation();" 
              class="opacity-40 hover:opacity-100 text-red-400 px-2">×</button>
    </div>
  `).join('');
}

function addTypedItem() {
  const input = document.getElementById('item-input');
  const text = input.value.trim();
  if (!text) return;

  const box = boxes.find(b => b.id === currentBoxId);
  if (!box.items) box.items = [];
  box.items.push(text);
  saveData();
  renderItemsList(box);
  renderBoxesList();
  input.value = '';
}

function addItemToCurrentBox() {
  const item = prompt("What item are you adding to this box?");
  if (!item || !item.trim()) return;

  const box = boxes.find(b => b.id === currentBoxId);
  if (!box.items) box.items = [];
  box.items.push(item.trim());
  saveData();
  renderItemsList(box);
  renderBoxesList();
}

// ==================== VOICE INPUT (Microphone) ====================
function startVoiceInput() {
  const micBtn = document.getElementById('mic-btn');
  const input = document.getElementById('item-input');

  if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
    alert("Voice input is not supported on this browser. Try Chrome on Android or the latest Safari.");
    return;
  }

  if (recognition) {
    recognition.stop();
    recognition = null;
    micBtn.classList.remove('listening');
    return;
  }

  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRec();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript.trim();
    if (transcript) {
      const box = boxes.find(b => b.id === currentBoxId);
      if (!box.items) box.items = [];
      box.items.push(transcript);
      saveData();
      renderItemsList(box);
      renderBoxesList();
    }
    micBtn.classList.remove('listening');
    recognition = null;
  };

  recognition.onerror = (event) => {
    console.error('Speech recognition error:', event);
    micBtn.classList.remove('listening');
    recognition = null;
    if (event.error === 'no-speech') {
      alert("Didn't hear anything. Try again.");
    } else {
      alert("Voice input error. Please try again or type instead.");
    }
  };

  recognition.onend = () => {
    micBtn.classList.remove('listening');
    recognition = null;
  };

  try {
    recognition.start();
    micBtn.classList.add('listening');
  } catch (e) {
    alert("Could not start voice input. Please try again.");
    micBtn.classList.remove('listening');
    recognition = null;
  }
}

function removeItem(index) {
  const box = boxes.find(b => b.id === currentBoxId);
  box.items.splice(index, 1);
  saveData();
  renderItemsList(box);
  renderBoxesList();
}

function saveNotes() {
  const box = boxes.find(b => b.id === currentBoxId);
  if (!box) return;
  box.notes = document.getElementById('modal-notes').value;
  saveData();
}

function saveCurrentBox() {
  if (!currentBoxId) return;
  const box = boxes.find(b => b.id === currentBoxId);
  if (!box) return;

  // Flush any unsaved notes
  const notesEl = document.getElementById('modal-notes');
  if (notesEl) box.notes = notesEl.value;

  // Flush any pending item text
  const itemInput = document.getElementById('item-input');
  if (itemInput && itemInput.value.trim()) {
    if (!box.items) box.items = [];
    box.items.push(itemInput.value.trim());
    itemInput.value = '';
    renderItemsList(box);
    renderBoxesList();
  }

  saveData();

  const btn = document.getElementById('save-box-btn');
  if (btn) {
    btn.textContent = '✓ Saved!';
    btn.style.background = '#10b981';
    setTimeout(() => {
      btn.textContent = 'Save';
      btn.style.background = '';
    }, 2000);
  }
}

function updateStatus(newStatus) {
  const box = boxes.find(b => b.id === currentBoxId);
  box.status = newStatus;
  saveData();
  console.log('[MoveBox] Status changed to', newStatus, 'for', currentBoxId, '— sync push should fire within 5 seconds');
  renderBoxesList();
  renderDashboard();
  showBoxDetail(currentBoxId);
}

function closeModal() {
  // Auto-save any text left in the item input before closing
  const itemInput = document.getElementById('item-input');
  if (itemInput && currentBoxId) {
    const text = itemInput.value.trim();
    if (text) {
      const box = boxes.find(b => b.id === currentBoxId);
      if (box) {
        if (!box.items) box.items = [];
        box.items.push(text);
        saveData();
        itemInput.value = '';
      }
    }
  }
  const modal = document.getElementById('box-modal');
  modal.classList.remove('flex');
  modal.classList.add('hidden');
  currentBoxId = null;
  renderBoxesList();
  renderDashboard();
}

function deleteCurrentBox() {
  if (!confirm("Delete this box permanently?")) return;
  boxes = boxes.filter(b => b.id !== currentBoxId);
  saveData();
  console.log('[MoveBox] Box deleted:', currentBoxId, '— sync push should fire within 5 seconds');
  currentBoxId = null;

  modal.classList.remove('flex');
  modal.classList.add('hidden');

  renderBoxesList();

// ==================== QR SCANNER ====================
function startScanner() {
  const qrReader = document.getElementById('qr-reader');
  qrReader.innerHTML = '';
  document.getElementById('scan-result').innerHTML = '';

  html5QrCode = new Html5Qrcode("qr-reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 280, height: 280 } },
    (decodedText) => {
      stopScanner();
      const foundBox = boxes.find(b => b.id === decodedText);
      if (foundBox) {
        document.getElementById('scan-result').innerHTML = 
          `<span class="text-emerald-400">✓ Found ${decodedText}</span>`;
        setTimeout(() => {
          showBoxDetail(decodedText);
          switchTab(1);
        }, 600);
      } else {
        document.getElementById('scan-result').innerHTML = 
          `<span class="text-red-400">Box ${decodedText} not found in this move.</span>`;
      }
    },
    (errorMessage) => {}
  ).catch(err => {
    document.getElementById('scan-result').innerHTML = 
      `<span class="text-red-400">Camera error: ${err}</span>`;
  });
}

function stopScanner() {
  if (html5QrCode) {
    html5QrCode.stop().then(() => {
      html5QrCode = null;
      document.getElementById('qr-reader').innerHTML = '';
    }).catch(() => {});
  }
}

      headers: { Authorization: 'Bearer ' + token }
    }).then(r => r.json()).then(d => {
      if (d.email){
        userEmail = d.email;
        _rawSet('mbsync_userEmail', userEmail);
        _rawSet('mbsync_loginHint', userEmail);
      }
    }).catch(() => {});
  }

  // ================== DRIVE API ==================
  function driveReq(method, url, body, contentType){
    const headers = { Authorization: 'Bearer ' + accessToken };
    if (contentType) headers['Content-Type'] = contentType;
    return fetch(url, { method, headers, body }).then(r => {
      if (r.status === 401){ silentRefresh(); throw new Error('Token expired'); }
      if (r.status === 404){
        driveFileId = null;
        localStorage.removeItem('mbsync_fileId');
        throw new Error('File not found — will recreate on next sync');
      }
      if (r.status === 204) return null;
      return r.json().then(data => { if (!r.ok) throw new Error(data?.error?.message || 'HTTP ' + r.status); return data; });
    });
  }

  function ensureFolder(){
    if (folderId) return Promise.resolve(folderId);
    if (_persisted.folderId){ folderId = _persisted.folderId; return Promise.resolve(folderId); }
    const q = encodeURIComponent(`name='${FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
    return driveReq('GET', `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`)
      .then(data => {
        if (data.files?.length) folderId = data.files[0].id;
        else return driveReq('POST', 'https://www.googleapis.com/drive/v3/files',
          JSON.stringify({ name: FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder' }), 'application/json')
          .then(f => { folderId = f.id; });
      }).then(() => { _rawSet('mbsync_folderId', folderId); return folderId; });
  }

  function ensureDataFile(){
    if (driveFileId) return Promise.resolve(driveFileId);
    if (_persisted.fileId){ driveFileId = _persisted.fileId; return Promise.resolve(driveFileId); }

    // Search for the data file across all accessible files (owned + shared with me)
    const q = encodeURIComponent(`name='${DATA_FILE}' and trashed=false`);
    const searchUrl = `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,owners,shared)&includeItemsFromAllDrives=true&supportsAllDrives=true&corpora=allDrives`;

    return driveReq('GET', searchUrl).then(data => {
      if (data.files && data.files.length > 0){
        // Found existing file (owned or shared) — use it
        driveFileId = data.files[0].id;
        _rawSet('mbsync_fileId', driveFileId);
        log('Using existing shared/owned data file', driveFileId);
        return driveFileId;
      }
      // No existing file anywhere — create a new one in this user's own folder
      return ensureFolder().then(() => uploadFile(null, buildPayload())).then(f => {
        driveFileId = f.id;
        _rawSet('mbsync_fileId', driveFileId);
        log('Created new data file (this user is owner)', driveFileId);
        return driveFileId;
      });
    });
  }

  function showUpdateToast(){
    const existing = document.getElementById('mbsync-update-toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.id = 'mbsync-update-toast';
    toast.style.cssText = 'position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:99999;background:#1f2937;border:2px solid #10b981;border-radius:14px;padding:12px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 24px rgba(0,0,0,0.5);font-family:system-ui;max-width:90vw;';
    toast.innerHTML = '<span style="color:#6ee7b7;font-size:15px;">📥 Boxes updated from another device</span><button onclick="this.parentElement.remove()" style="background:#10b981;color:#111;border:none;border-radius:8px;padding:6px 14px;font-weight:700;cursor:pointer;font-size:13px;flex-shrink:0;">OK</button>';
    document.body.appendChild(toast);
  }

  function buildPayload(){
    const payload = { version: 1, device: /Mobile|Android/i.test(navigator.userAgent) ? 'Mobile' : 'Desktop', syncedAt: new Date().toISOString(), keys: {} };
    SYNC_KEYS.forEach(k => {
      const val = localStorage.getItem(k);
      if (val !== null) payload.keys[k] = { value: val, updatedAt: localStorage.getItem('mbsync_ts_' + k) || new Date(0).toISOString() };
    });
    return payload;
  }

  function applyPayload(payload){
    if (!payload?.keys) return 0;
    let changed = 0;
    SYNC_KEYS.forEach(k => {
      const remote = payload.keys[k];
      if (!remote) return;
      const localTs = localStorage.getItem('mbsync_ts_' + k) || new Date(0).toISOString();
      if (remote.updatedAt > localTs){
        _rawSet(k, remote.value);
        _rawSet('mbsync_ts_' + k, remote.updatedAt);
        changed++;
      }
    });
    if (changed > 0 && typeof window.refreshMoveBoxUI === 'function') {
      window.refreshMoveBoxUI();
      if (initialPullDone) showUpdateToast();
    }
    return changed;
  }

  function uploadFile(fileId, data){
    const json = JSON.stringify(data, null, 2);
    const boundary = 'mbsync_' + Date.now();
    const meta = JSON.stringify({ name: DATA_FILE, mimeType: 'application/json', ...(folderId && !fileId ? { parents: [folderId] } : {}) });
    const body = [`--${boundary}`, 'Content-Type: application/json; charset=UTF-8', '', meta, `--${boundary}`, 'Content-Type: application/json', '', json, `--${boundary}--`].join('\r\n');
    const url = fileId
      ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart&supportsAllDrives=true`
      : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&supportsAllDrives=true';
    return driveReq(fileId ? 'PATCH' : 'POST', url, body, `multipart/related; boundary="${boundary}"`);
  }

  function pullFromDrive(){
    if (!tokenValid()) return Promise.resolve(0);
    return ensureDataFile().then(fid => fetch(`https://www.googleapis.com/drive/v3/files/${fid}?alt=media&supportsAllDrives=true&t=${Date.now()}`, { headers: { Authorization: 'Bearer ' + accessToken } }))
      .then(r => { if (!r.ok) throw new Error('Fetch failed'); return r.json(); })
      .then(data => { const changed = applyPayload(data); _rawSet('mbsync_lastSync', new Date().toISOString()); return changed; });
  }

  function pushToDrive(){
    if (!tokenValid() || !initialPullDone || isSyncing) return;
    if (!navigator.onLine){ showPill('offline', 'Offline', 3000); return; }
    isSyncing = true; showPill('syncing', 'Syncing...');
    ensureDataFile().then(fid => uploadFile(fid, buildPayload()))
      .then(() => { isSyncing = false; _rawSet('mbsync_lastSync', new Date().toISOString()); showPill('signed-in', '✓ Synced', 2500); })
      .catch(err => { isSyncing = false; logError('Push failed', err); showPill('error', 'Sync failed — retrying', 5000); setTimeout(() => { if (isSignedIn) pushToDrive(); }, 60000); });
  }

  function debouncedPush(){
    if (pushTimer) clearTimeout(pushTimer);
    pushTimer = setTimeout(pushToDrive, PUSH_DEBOUNCE);
  }

  function setupAndPull(){
    return ensureFolder().then(() => ensureDataFile()).then(() => pullFromDrive())
      .then(changed => { initialPullDone = true; if (typeof window.refreshMoveBoxUI === 'function') window.refreshMoveBoxUI(); if (changed > 0) showUpdateToast(); showPill('signed-in', '✓ Synced', 2500); })
      .catch(err => {
        logError('Initial pull failed', err);
        // Set initialPullDone anyway so the 30s poll and pushes can still start
        initialPullDone = true;
        showPill('error', 'Sync error — will retry', 4000);
        // Retry once after 15 seconds
        setTimeout(() => {
          if (isSignedIn) pullFromDrive()
            .then(changed => { if (typeof window.refreshMoveBoxUI === 'function') window.refreshMoveBoxUI(); if (changed > 0) showUpdateToast(); showPill('signed-in', '✓ Synced', 2500); })
            .catch(e => logError('Retry pull failed', e));
        }, 15000);
      });
  }

  // ================== PUBLIC API ==================
  window.MBSync = {
    signIn(){
      showPill('syncing', 'Loading...');
      loadGIS().then(() => { const tc = ensureTokenClient(); if (tc) tc.requestAccessToken({ prompt: 'select_account' }); })
        .catch(() => showPill('error', 'Sign-in unavailable', 4000));
    },
    signOut(){
      if (accessToken && window.google?.accounts?.oauth2) try { window.google.accounts.oauth2.revoke(accessToken, () => {}); } catch(e){}
      clearToken();
      if (pushTimer){ clearTimeout(pushTimer); pushTimer = null; }
      const pill = document.getElementById('mbsyncPill'); if (pill) pill.classList.remove('show');
      const bg = document.getElementById('mbsyncModalBg'); if (bg) bg.classList.remove('show');
    },
    syncNow(){
      if (!isSignedIn) return;
      const bg = document.getElementById('mbsyncModalBg'); if (bg) bg.classList.remove('show');
      showPill('syncing', 'Syncing...');
      pullFromDrive().then(() => { if (typeof window.refreshMoveBoxUI === 'function') window.refreshMoveBoxUI(); }).finally(() => pushToDrive());
    },
    openModal,
    isSignedIn: () => isSignedIn,
    getEmail: () => userEmail
  };

  // ================== INIT ==================
  function initSync(){
    injectStyles();
    injectPill();
    injectModal();

    const stillGood = _persisted.token && _persisted.expiry > Date.now() + 60000;
    if (stillGood){
      accessToken = _persisted.token; tokenExpiry = _persisted.expiry; userEmail = _persisted.email;
      folderId = _persisted.folderId || null; driveFileId = _persisted.fileId || null;
      isSignedIn = true;
      showPill('syncing', 'Reconnecting...');
      loadGIS().then(() => { ensureTokenClient(); scheduleRefresh(); return setupAndPull(); })
        .then(() => showPill('signed-in', '✓ Synced', 2500))
        .catch(() => silentRefresh());
    } else if (_persisted.email || localStorage.getItem('mbsync_loginHint')){
      userEmail = _persisted.email || localStorage.getItem('mbsync_loginHint');
      silentRefreshPending = true;
      showPill('syncing', 'Reconnecting...');
      loadGIS().then(() => { ensureTokenClient(); silentRefresh(); }).catch(() => showPill(null, 'Sign in to sync', 5000));
    } else {
      showPill(null, 'Cloud Sync', 3000);
    }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initSync);
  else setTimeout(initSync, 120);

  // Expose a helper so applyPayload can refresh the UI
  window.refreshMoveBoxUI = function(){
    try {
      if (window.__reloadBoxes) window.__reloadBoxes();
      if (typeof renderDashboard === 'function') renderDashboard();
      if (typeof renderBoxesList === 'function') renderBoxesList();
      if (typeof populateRoomFilter === 'function') populateRoomFilter();
      const modal = document.getElementById('box-modal');
      if (modal && !modal.classList.contains('hidden') && currentBoxId && typeof showBoxDetail === 'function') {
        showBoxDetail(currentBoxId);
      }
    } catch(e){ console.error('[refreshMoveBoxUI]', e); }
  };

  // Pull fresh data when user returns to the tab
  window.addEventListener('focus', () => {
    if (isSignedIn && initialPullDone) pullFromDrive()
      .then(() => { if (typeof window.refreshMoveBoxUI === 'function') window.refreshMoveBoxUI(); })
      .catch(err => logError('Focus pull failed', err));
  });

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && isSignedIn && initialPullDone) {
      pullFromDrive()
        .then(() => { if (typeof window.refreshMoveBoxUI === 'function') window.refreshMoveBoxUI(); })
        .catch(err => logError('Visibility pull failed', err));
    }
  });

  // Periodic fallback poll every 30s — catches updates when both devices
  // have the app open simultaneously (focus/visibilitychange never fire in that case)
  setInterval(() => {
    if (isSignedIn && initialPullDone) pullFromDrive()
      .then(() => { if (typeof window.refreshMoveBoxUI === 'function') window.refreshMoveBoxUI(); })
      .catch(err => logError('Periodic pull failed', err));
  }, 30000);

  window.addEventListener('beforeunload', () => {
    if (isSignedIn && initialPullDone && pushTimer) {
      clearTimeout(pushTimer);
      try { pushToDrive(); } catch(e){}
    }
  });

})();
</script>
</body>
</html>
